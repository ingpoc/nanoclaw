name: CI Failure Summary

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-failure-summary-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  summarize-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Post or update CI failure summary
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-summary -->';
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info('No associated PR found for this workflow_run.');
              return;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              },
            );

            const failedJobs = jobs.filter((job) => job.conclusion === 'failure');
            const failedLines = failedJobs.length > 0
              ? failedJobs.map((job) => {
                  const failedSteps = (job.steps || []).filter(
                    (step) => step.conclusion === 'failure',
                  );
                  const stepText = failedSteps.length > 0
                    ? ` -> \`${failedSteps.map((step) => step.name).join('`, `')}\``
                    : '';
                  return `- \`${job.name}\`${stepText} ([logs](${job.html_url}))`;
                }).join('\n')
              : '- Workflow run failed before a job-level failure summary was available.';

            const sha = run.head_sha ? run.head_sha.slice(0, 7) : 'unknown';
            const body = [
              marker,
              '## CI Failure Summary',
              '',
              `Workflow: [${run.name} #${run.run_number}](${run.html_url})`,
              `Head SHA: \`${sha}\``,
              '',
              '**Failing jobs / steps**',
              failedLines,
              '',
              'Suggested next step:',
              '- If you want Claude to inspect this, reply with `@claude investigate this CI failure and propose the smallest safe fix.`',
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              },
            );

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated CI failure summary comment on PR #${pr.number}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
            core.info(`Created CI failure summary comment on PR #${pr.number}.`);

  clear-summary:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Remove stale CI failure summary
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-failure-summary -->';
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info('No associated PR found for this workflow_run.');
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              },
            );

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (!existing) {
              core.info(`No stale CI failure summary found on PR #${pr.number}.`);
              return;
            }

            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
            });
            core.info(`Removed stale CI failure summary comment from PR #${pr.number}.`);
